  - "Psicologia dinamica"
  - "Psicologia del lavoro"
  - "Neuropsicologia"
  - "Test psicologici"
  - "Psicologia della personalita'"
  - "Psicologia dell'educazione"

optional_name_suffixes: ["A", "B", "C", "D"]

